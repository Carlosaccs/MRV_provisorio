<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MRV Mobile Premium</title>
    <link rel="stylesheet" href="mobile.css?v=2">
</head>
<body>

    <div class="mobile-wrapper">

        <aside class="faixa-verde-vertical">
            <button class="btn-zoom-toggle" onclick="toggleFullScreen()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">
                ⛶
            </button>
            <div class="titulo-vertical">RESIDENCIAIS MRV</div>
            <button class="btn-menu-toggle" onclick="toggleMenu()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">
                ☰
            </button>
        </aside>

        <main class="conteudo-principal">
            
            <div id="mapa-container">
                </div>

            <section class="mobile-ficha" id="ficha-tecnica">
                <div style="text-align:center; padding-top:20px; color:#999;">
                    Selecione um residencial para ver os detalhes
                </div>
            </section>

            <nav class="mobile-sidebar" id="sidebar-imoveis">
                <div id="lista-imoveis-mobile">
                    </div>
            </nav>

            <div class="ilha-troca" onclick="trocarRegiao()">
                <div id="mini-mapa-container" style="width:100%; height:100%;"></div>
            </div>

        </main>
    </div>

    <script src="mrv-data.js"></script>
    <script src="mobile.js"></script>
</body>
</html>
