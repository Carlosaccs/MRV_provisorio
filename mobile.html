<!DOCTYPE html>
<html lang="pt-br" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="google" content="notranslate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV SP - Mobile</title>
    <link rel="stylesheet" href="style-mobile.css">
</head>
<body>

    <div class="header">
        <button id="btn-menu" onclick="toggleMenu()">☰</button>
        RESIDENCIAIS MRV
        <button id="btn-sobre">Sobre</button>
    </div>

    <div class="wrapper">
        <div id="menu-overlay" onclick="toggleMenu()"></div>

        <aside class="sidebar-esq" id="lista-imoveis">
            </aside>
        
        <main class="conteudo-centro">
            <div id="cidade-titulo">Selecione uma região no mapa</div> 
            <div id="caixa-a"></div> 
            <div id="caixa-b"></div> 
        </main>

        <aside class="sidebar-dir" id="ficha-tecnica">
            <div style="text-align:center; color:#ccc; margin-top:100px;">
                <p style="font-size: 30px;">📍</p>
                <p>Abra o menu lateral ou clique no mapa</p>
            </div>
        </aside>
    </div>

    <div id="modal-sobre" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2 style="color: #00713a;">Sobre o Projeto</h2>
            <p>Dashboard de consulta rápida para corretores MRV.</p>
        </div>
    </div>

    <script src="mrv-data.js"></script>
    <script src="mrv-engine-mobile.js"></script>
    <script>
        function toggleMenu() {
            const menu = document.getElementById('lista-imoveis');
            const overlay = document.getElementById('menu-overlay');
            menu.classList.toggle('menu-aberto');
            overlay.classList.toggle('ativo');
        }
    </script>
</body>
</html>
